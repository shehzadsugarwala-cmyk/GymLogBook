<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GymLogBook V2</title>
<style>
body{font-family:Arial,sans-serif;background:#f4f4f4;margin:0;padding:15px}
.card{background:#fff;padding:15px;margin-bottom:12px;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.15)}
input,select,textarea,button{width:100%;padding:10px;margin:5px 0}
table{width:100%;border-collapse:collapse}
th,td{border:1px solid #ddd;padding:6px}
.smallbtn{width:auto;padding:6px 10px}
pre{white-space:pre-wrap;background:#eee;padding:10px}
</style>
</head>
<body>

<h1>🏋 GymLogBook V2</h1>

<div class="card">
<h2>Dashboard</h2>
<label>Current Weight (kg)</label>
<input id="currentWeight" type="number">
<label>Target Weight (kg)</label>
<input id="targetWeight" type="number" value="80">
<button onclick="saveDashboard()">Save Dashboard</button>
<div id="dashView"></div>
</div>

<div class="card">
<h2>Measurements</h2>
<input id="waist" placeholder="Waist">
<input id="chest" placeholder="Chest">
<input id="arm" placeholder="Arm Flexed">
<button onclick="saveMeasurement()">Save Measurement</button>
<div id="measurementHistory"></div>
</div>

<div class="card">
<h2>Workout Logger</h2>
<select id="workoutType">
<option>Push</option>
<option>Pull</option>
<option>Legs + Core</option>
<option>Rest</option>
</select>
<input id="exercise" placeholder="Exercise">
<input id="weightUsed" type="number" placeholder="Weight">
<input id="reps" type="number" placeholder="Reps">
<input id="sets" type="number" placeholder="Sets">
<button onclick="addExercise()">Add Exercise</button>
<div id="workoutTable"></div>
<button onclick="saveWorkout()">Finish Workout Day</button>
</div>

<div class="card">
<h2>Recovery Notes</h2>
<input id="sleep" type="number" placeholder="Sleep Hours">
<input id="energy" type="number" placeholder="Energy 1-10">
<textarea id="notes" placeholder="Notes"></textarea>
</div>

<div class="card">
<h2>ChatGPT Export</h2>
<button onclick="generateExport()">Generate Export</button>
<button onclick="copyExport()">Copy Export</button>
<pre id="exportBox"></pre>
</div>

<div class="card">
<h2>Workout History</h2>
<div id="history"></div>
</div>

<script>
let dashboard=JSON.parse(localStorage.getItem("dashboard")||"{}");
let measurements=JSON.parse(localStorage.getItem("measurements")||"[]");
let today=JSON.parse(localStorage.getItem("today")||"[]");
let workouts=JSON.parse(localStorage.getItem("workouts")||"[]");

function saveDashboard(){
 dashboard.current=document.getElementById("currentWeight").value;
 dashboard.target=document.getElementById("targetWeight").value;
 localStorage.setItem("dashboard",JSON.stringify(dashboard));
 renderDashboard();
}

function renderDashboard(){
 let c=dashboard.current||0;
 let t=dashboard.target||80;
 document.getElementById("dashView").innerHTML=
 `Current: ${c} kg<br>Target: ${t} kg<br>Remaining: ${(c-t).toFixed(1)} kg`;
 document.getElementById("currentWeight").value=c;
 document.getElementById("targetWeight").value=t;
}

function saveMeasurement(){
 measurements.push({
   date:new Date().toLocaleDateString(),
   weight:dashboard.current,
   waist:waist.value,
   chest:chest.value,
   arm:arm.value
 });
 localStorage.setItem("measurements",JSON.stringify(measurements));
 renderMeasurements();
}

function renderMeasurements(){
 let h="<table><tr><th>Date</th><th>Wt</th><th>Waist</th></tr>";
 measurements.forEach(m=>h+=`<tr><td>${m.date}</td><td>${m.weight}</td><td>${m.waist}</td></tr>`);
 h+="</table>";
 document.getElementById("measurementHistory").innerHTML=h;
}

function addExercise(){
 today.push({
  exercise:exercise.value,
  weight:weightUsed.value,
  reps:reps.value,
  sets:sets.value
 });
 localStorage.setItem("today",JSON.stringify(today));
 renderToday();
 exercise.value="";
}

function renderToday(){
 let h="<table><tr><th>Exercise</th><th>Wt</th><th>Reps</th><th>Sets</th></tr>";
 today.forEach(x=>h+=`<tr><td>${x.exercise}</td><td>${x.weight}</td><td>${x.reps}</td><td>${x.sets}</td></tr>`);
 h+="</table>";
 document.getElementById("workoutTable").innerHTML=h;
}

function saveWorkout(){
 workouts.push({
   date:new Date().toLocaleDateString(),
   type:workoutType.value,
   exercises:[...today]
 });
 localStorage.setItem("workouts",JSON.stringify(workouts));
 today=[];
 localStorage.setItem("today","[]");
 renderToday();
 renderHistory();
 alert("Workout saved");
}

function renderHistory(){
 let h="";
 workouts.forEach(w=>{
   h+=`<div><b>${w.date} - ${w.type}</b><br>`;
   w.exercises.forEach(e=>h+=`${e.exercise} ${e.sets}x${e.reps} @ ${e.weight}kg<br>`);
   h+="<hr></div>";
 });
 document.getElementById("history").innerHTML=h;
}

function generateExport(){
 let txt=`Date: ${new Date().toLocaleDateString()}\n`;
 txt+=`Weight: ${dashboard.current||""}kg\n\n`;
 txt+=`Workout: ${workoutType.value}\n\n`;
 today.forEach(e=>{
   txt+=`${e.exercise}\n${e.sets}x${e.reps} @ ${e.weight}kg\n\n`;
 });
 txt+=`Sleep: ${sleep.value} hrs\nEnergy: ${energy.value}/10\nNotes: ${notes.value}`;
 exportBox.textContent=txt;
}

function copyExport(){
 navigator.clipboard.writeText(exportBox.textContent);
 alert("Copied");
}

renderDashboard();
renderMeasurements();
renderToday();
renderHistory();
</script>
</body>
</html>
